<!DOCTYPE html>
<html>
<head>
    <title>Campus Chat - Public Forum</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        :root {
            --bg-light: #f9f8f6;
            --white: #ffffff;
            --text-dark: #1f2937;
            --text-muted: #6b7280;
            --accent-warm: #c85a3a;
            --accent-blue: #3b82f6;
            --accent-green: #10b981;
            --border-light: #e5e7eb;
            --shadow-soft: rgba(0, 0, 0, 0.08);
            --shadow-medium: rgba(0, 0, 0, 0.12);
            --radius: 14px;
            --radius-lg: 20px;
            --transition: 240ms ease;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Inter', system-ui, sans-serif;
            color: var(--text-dark);
            background: linear-gradient(135deg, #f9f8f6 0%, #f3f1ed 100%);
            overflow: hidden;
        }

        .chat-container {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            gap: 0;
        }

        /* Sidebar */
        .sidebar {
            background: var(--white);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: 4px 0 16px var(--shadow-soft);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border-light);
        }

        .sidebar-brand {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .sidebar-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, rgba(200, 90, 58, 0.1), rgba(59, 130, 246, 0.1));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .sidebar-brand-text h3 {
            margin: 0;
            font-size: 1rem;
            font-weight: 700;
            background: linear-gradient(135deg, #c85a3a, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .sidebar-brand-text p {
            margin: 4px 0 0;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .user-info {
            background: #f9fafb;
            padding: 12px 16px;
            border-radius: var(--radius);
            margin-top: 12px;
            font-size: 0.85rem;
        }

        .user-label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-bottom: 4px;
        }

        .user-name {
            display: block;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-dark);
            word-break: break-all;
        }

        .sidebar-nav {
            flex: 1;
            padding: 20px 12px;
            overflow-y: auto;
        }

        .nav-item {
            padding: 12px 16px;
            margin-bottom: 8px;
            border-radius: var(--radius);
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.9rem;
            transition: all var(--transition);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .nav-item:hover {
            background: #f0f1f3;
            color: var(--accent-blue);
            transform: translateX(4px);
        }

        .nav-item.active {
            background: linear-gradient(135deg, rgba(200, 90, 58, 0.1), rgba(59, 130, 246, 0.1));
            color: var(--accent-blue);
            font-weight: 600;
            border-left: 3px solid var(--accent-blue);
            padding-left: 13px;
        }

        .sidebar-footer {
            padding: 16px 12px;
            border-top: 1px solid var(--border-light);
        }

        .logout-btn {
            padding: 10px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--accent-warm);
            background: var(--white);
            color: var(--accent-warm);
            font-weight: 600;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            text-decoration: none;
            transition: all var(--transition);
            display: block;
            width: 100%;
            text-align: center;
        }

        .logout-btn:hover {
            background: var(--accent-warm);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(200, 90, 58, 0.25);
        }

        /* Main Chat Area */
        .chat-main {
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #f9f8f6 0%, #f3f1ed 100%);
        }

        .chat-header {
            padding: 24px 32px;
            background: var(--white);
            border-bottom: 1px solid var(--border-light);
            box-shadow: 0 2px 8px var(--shadow-soft);
        }

        .chat-header h1 {
            margin: 0 0 8px;
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            background: linear-gradient(135deg, #1f2937, #c85a3a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .chat-header p {
            margin: 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        /* Messages Container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .messages-container::-webkit-scrollbar {
            width: 8px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--accent-blue);
            border-radius: 999px;
            transition: background var(--transition);
        }

        .messages-container::-webkit-scrollbar-thumb:hover {
            background: var(--accent-warm);
        }

        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            color: var(--text-muted);
        }

        .empty-chat-icon {
            font-size: 56px;
            margin-bottom: 16px;
        }

        .empty-chat p {
            margin: 0;
            font-size: 1rem;
            line-height: 1.6;
            max-width: 300px;
        }

        .message-bubble {
            display: flex;
            flex-direction: column;
            gap: 8px;
            animation: slideIn 300ms ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message-bubble.own {
            align-items: flex-end;
        }

        .message-content {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 60%;
        }

        .message-bubble.own .message-content {
            align-items: flex-end;
        }

        .message-user {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            padding: 0 12px;
        }

        .message-text {
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            font-size: 0.95rem;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message-bubble:not(.own) .message-text {
            background: var(--white);
            color: var(--text-dark);
            border: 1px solid var(--border-light);
            box-shadow: 0 4px 12px var(--shadow-soft);
        }

        .message-bubble.own .message-text {
            background: linear-gradient(135deg, #c85a3a, #d97a52);
            color: var(--white);
        }

        .message-time {
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0 12px;
        }

        /* Input Area */
        .chat-input-area {
            padding: 20px 32px;
            background: var(--white);
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 12px;
        }

        .input-form {
            display: flex;
            gap: 12px;
            flex: 1;
        }

        .input-form input {
            flex: 1;
            padding: 14px 16px;
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
            background: #f9fafb;
            color: var(--text-dark);
            font-size: 0.95rem;
            font-family: 'Inter', system-ui, sans-serif;
            outline: none;
            transition: all var(--transition);
        }

        .input-form input::placeholder {
            color: #a3a3a3;
        }

        .input-form input:focus {
            border-color: var(--accent-blue);
            background: var(--white);
            box-shadow: 0 0 0 6px rgba(59, 130, 246, 0.08);
        }

        .send-btn {
            padding: 14px 24px;
            border-radius: var(--radius);
            border: none;
            background: linear-gradient(135deg, #c85a3a, #d97a52);
            color: var(--white);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all var(--transition);
            box-shadow: 0 4px 12px rgba(200, 90, 58, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .send-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(200, 90, 58, 0.3);
            background: linear-gradient(135deg, #b84a2a, #cf6a42);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .chat-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                position: fixed;
                left: -280px;
                top: 0;
                height: 100vh;
                z-index: 100;
                transition: left var(--transition);
                max-width: 280px;
            }

            .sidebar.active {
                left: 0;
                box-shadow: 4px 0 16px var(--shadow-medium);
            }

            .chat-main {
                width: 100%;
            }

            .chat-header {
                padding: 16px 20px;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .chat-header h1 {
                font-size: 1.3rem;
                margin: 0;
            }

            .chat-header p {
                display: none;
            }

            .messages-container {
                padding: 20px;
            }

            .chat-input-area {
                padding: 16px 20px;
            }

            .message-content {
                max-width: 80%;
            }

            .menu-toggle {
                display: block;
                background: none;
                border: none;
                font-size: 24px;
                cursor: pointer;
                color: var(--text-dark);
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="sidebar-icon">💬</div>
                    <div class="sidebar-brand-text">
                        <h3>Campus Chat</h3>
                        <p>Public Forum</p>
                    </div>
                </div>
                <div class="user-info">
                    <span class="user-label">Logged In As</span>
                    <span class="user-name">{{ session.user_id }}</span>
                </div>
            </div>

            <nav class="sidebar-nav">
                <a href="/" class="nav-item">
                    <span>📝</span>
                    Report Issue
                </a>
                <a href="/chat" class="nav-item active">
                    <span>💬</span>
                    Campus Chat
                </a>
            </nav>

            <div class="sidebar-footer">
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </div>

        <!-- Main Chat Area -->
        <div class="chat-main">
            <!-- Chat Header -->
            <div class="chat-header">
                <div>
                    <h1>Campus Public Chat</h1>
                    <p>Connect with students across campus</p>
                </div>
            </div>

            <!-- Messages Container -->
            <div class="messages-container" id="messagesContainer">
                <div class="empty-chat">
                    <div class="empty-chat-icon">💭</div>
                    <p>No messages yet. Be the first to start the conversation!</p>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <form class="input-form" id="messageForm">
                    <input type="text" id="messageInput" placeholder="Type your message..." autocomplete="off" required>
                    <button type="submit" class="send-btn">Send</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const messageForm = document.getElementById('messageForm');
        const messageInput = document.getElementById('messageInput');
        const messagesContainer = document.getElementById('messagesContainer');
        let lastMessageCount = 0;

        // Load messages on page load
        loadMessages();

        // Auto-refresh messages every 2 seconds
        setInterval(loadMessages, 2000);

        // Send message on form submit
        messageForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const message = messageInput.value.trim();

            if (message) {
                try {
                    const response = await fetch('/api/chat/send', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ message })
                    });

                    if (response.ok) {
                        messageInput.value = '';
                        messageInput.focus();
                        // Load messages immediately after sending
                        setTimeout(loadMessages, 100);
                    }
                } catch (error) {
                    console.error('Error sending message:', error);
                }
            }
        });

        async function loadMessages() {
            try {
                const response = await fetch('/api/chat/messages');
                const messages = await response.json();

                if (messages.length === 0) {
                    messagesContainer.innerHTML = `
                        <div class="empty-chat">
                            <div class="empty-chat-icon">💭</div>
                            <p>No messages yet. Be the first to start the conversation!</p>
                        </div>
                    `;
                    lastMessageCount = 0;
                    return;
                }

                // Only update if there are new messages
                if (messages.length !== lastMessageCount) {
                    messagesContainer.innerHTML = '';
                    
                    messages.forEach(msg => {
                        const messageDiv = document.createElement('div');
                        messageDiv.className = `message-bubble ${msg.username === '{{ session.user_id }}' ? 'own' : ''}`;
                        
                        const timeObj = new Date(msg.created_at);
                        const timeStr = timeObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                        
                        messageDiv.innerHTML = `
                            <div class="message-content">
                                ${msg.username !== '{{ session.user_id }}' ? `<div class="message-user">${escapeHtml(msg.username)}</div>` : ''}
                                <div class="message-text">${escapeHtml(msg.message)}</div>
                                <div class="message-time">${timeStr}</div>
                            </div>
                        `;
                        
                        messagesContainer.appendChild(messageDiv);
                    });

                    // Scroll to bottom
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    lastMessageCount = messages.length;
                }
            } catch (error) {
                console.error('Error loading messages:', error);
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Mobile sidebar toggle
        const menuToggle = document.getElementById('menuToggle');
        const sidebar = document.getElementById('sidebar');
        if (menuToggle) {
            menuToggle.addEventListener('click', () => {
                sidebar.classList.toggle('active');
            });
        }
    </script>
</body>
</html>
